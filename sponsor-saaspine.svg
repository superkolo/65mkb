<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <defs>
    <linearGradient id="spineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="spineGradAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Symbol -->
  <g transform="translate(20, 25)">
    <rect x="8"  y="72" width="74" height="14" rx="7" fill="url(#spineGrad)"/>
    <rect x="12" y="54" width="66" height="14" rx="7" fill="url(#spineGrad)" opacity="0.92"/>
    <rect x="16" y="36" width="58" height="14" rx="7" fill="url(#spineGrad)" opacity="0.84"/>
    <rect x="20" y="18" width="50" height="14" rx="7" fill="url(#spineGrad)" opacity="0.76"/>
    <rect x="24" y="0"  width="42" height="14" rx="7" fill="url(#spineGradAccent)"/>
    <circle cx="45" cy="18" r="2" fill="#ffffff" opacity="0.9"/>
    <circle cx="45" cy="36" r="2" fill="#ffffff" opacity="0.9"/>
    <circle cx="45" cy="54" r="2" fill="#ffffff" opacity="0.9"/>
    <circle cx="45" cy="72" r="2" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Wordmark + domena pod spodem do lewej -->
  <g transform="translate(130, 0)">
    <text x="0" y="85"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="52"
          font-weight="700"
          fill="#0F172A"
          letter-spacing="-1.5">SaaSpine</text>
    <text x="2" y="108"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="11"
          font-weight="500"
          fill="#64748B"
          letter-spacing="4">SAASPINE.COM</text>
  </g>
